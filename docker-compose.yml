services:
  app:
    image: dmidnight/agent-board:latest
    container_name: agent-board-app
    restart: unless-stopped
    profiles:
      - app
    depends_on:
      - mongo
      - minio
      - minio-init
    ports:
      - "3002:3000"
    environment:
      MONGODB_URI: mongodb://agentboard:agentboard@mongo:27017/agentboard?authSource=admin
      SESSION_SECRET: ${SESSION_SECRET:-development-only-compose-session-secret-change-me}
      SESSION_COOKIE_SECURE: "false"
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Agent Board}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3002}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      INVITATION_FROM_EMAIL: ${INVITATION_FROM_EMAIL:-}
      INVITATION_FROM_NAME: ${INVITATION_FROM_NAME:-Agent Board}
      ATTACHMENT_STORAGE_PROVIDER: s3
      ATTACHMENT_BUCKET: agent-board-attachments
      ATTACHMENT_BASE_PREFIX: attachments
      ATTACHMENT_REGION: us-east-1
      ATTACHMENT_ENDPOINT: http://minio:9000
      ATTACHMENT_FORCE_PATH_STYLE: "true"
      ATTACHMENT_ACCESS_KEY_ID: agentboard
      ATTACHMENT_SECRET_ACCESS_KEY: agentboard-secret
      ATTACHMENT_MAX_BYTES: ${ATTACHMENT_MAX_BYTES:-10485760}

  mongo:
    image: mongo:7
    container_name: agent-board-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: agentboard
      MONGO_INITDB_ROOT_PASSWORD: agentboard
      MONGO_INITDB_DATABASE: agentboard
    volumes:
      - mongo-data:/data/db

  minio:
    image: minio/minio:latest
    container_name: agent-board-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: agentboard
      MINIO_ROOT_PASSWORD: agentboard-secret
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 agentboard agentboard-secret; do sleep 1; done;
      mc mb -p local/agent-board-attachments;
      mc anonymous set none local/agent-board-attachments;
      "

volumes:
  mongo-data:
  minio-data:
